<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-gray-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Backcash</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#fff3f0', 100: '#ffe4dd', 400: '#FF8A65',
                            500: '#FF7043', 600: '#f9512d', 900: '#752210',
                        },
                        navy: { 800: '#1e293b', 900: '#0f172a' }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'card': '0 20px 40px -15px rgba(0,0,0,0.08)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .sidebar-link-active { @apply bg-brand-50 text-brand-600 font-bold; }
            .sidebar-link-inactive { @apply text-slate-500 hover:bg-gray-50 hover:text-slate-900 font-medium; }
            .input-field { @apply w-full bg-gray-50 border border-gray-200 text-slate-900 text-sm font-medium rounded-xl focus:ring-brand-500 focus:border-brand-500 block p-3.5 outline-none transition-colors hover:border-gray-300; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="text-slate-800 antialiased selection:bg-brand-500 selection:text-white flex h-screen overflow-hidden">

    <!-- Desktop Sidebar -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-100 h-full flex-shrink-0 relative z-20">
        <div class="h-20 flex items-center px-6 border-b border-gray-50">
            <a href="dashboard-home.html" class="flex items-center gap-2">
                <div
                    class="w-10 h-10 bg-gradient-to-br from-brand-400 to-orange-500 rounded-xl flex items-center justify-center text-white shadow-sm">
                    <i data-lucide="wallet" class="w-6 h-6"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900">Backcash</span>
            </a>
        </div>

        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1 no-scrollbar">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-3">Menu</div>

            <a href="dashboard-home.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>Dashboard</span>
            </a>

            <a href="dashboard-cashback.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span>Cashback Home</span>
            </a>

            <a href="dashboard-withdraw.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="arrow-down-to-line" class="w-5 h-5"></i>
                <span>Withdraw</span>
            </a>

            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="receipt" class="w-5 h-5"></i>
                <span>Transactions</span>
            </a>

            <a href="dashboard-products.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
                <span>Top Products</span>
            </a>

            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 mt-8 px-3">Account</div>

            <a href="dashboard-profile.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-active transition-colors">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span>Profile</span>
            </a>

            <a href="dashboard-payment.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="credit-card" class="w-5 h-5"></i>
                <span>Payment Methods</span>
            </a>

            <a href="dashboard-about.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="info" class="w-5 h-5"></i>
                <span>About Platform</span>
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full bg-slate-50 relative overflow-hidden">
        <!-- Top Header -->
        <header
            class="h-20 bg-white border-b border-gray-100 flex items-center justify-between px-6 z-10 flex-shrink-0">
            <div class="md:hidden flex items-center gap-2">
                <div
                    class="w-8 h-8 bg-gradient-to-br from-brand-400 to-orange-500 rounded-lg flex items-center justify-center text-white shadow-sm">
                    <i data-lucide="wallet" class="w-4 h-4"></i>
                </div>
            </div>

            <h1 class="hidden md:block text-xl font-bold text-slate-900">Profile Settings</h1>

            <div class="flex items-center gap-3 md:gap-5">
                <div
                    class="hidden sm:flex items-center gap-2 bg-green-50 px-3 py-1.5 rounded-full border border-green-100">
                    <i data-lucide="coins" class="w-4 h-4 text-green-600"></i>
                    <span class="font-bold text-green-700 text-sm">$340.50</span>
                </div>

                <button
                    class="relative w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:bg-gray-100 transition-colors">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span
                        class="absolute top-2 right-2.5 w-2 h-2 bg-brand-500 rounded-full border-2 border-white"></span>
                </button>

                <button class="flex items-center gap-2 focus:outline-none pl-2 border-l border-gray-200">
                    <img src="https://i.pravatar.cc/150?img=11" alt="User Avatar"
                        class="w-9 h-9 rounded-full border-2 border-white shadow-sm box-content">
                    <div class="hidden md:block text-left">
                        <div class="text-sm font-bold text-slate-900 leading-tight">Alex Mitchell</div>
                    </div>
                </button>
            </div>
        </header>

        <!-- Page Content -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 no-scrollbar">
            <div class="max-w-4xl mx-auto space-y-6">

                <!-- User Info Settings -->
                <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100">
                    <h3 class="font-bold text-slate-900 text-lg mb-6 tracking-tight">Personal Information</h3>

                    <div class="flex flex-col sm:flex-row gap-8 items-start">
                        <!-- Avatar Column -->
                        <div class="flex flex-col items-center gap-4 shrink-0">
                            <div class="relative group">
                                <img src="https://i.pravatar.cc/150?img=11"
                                    class="w-32 h-32 rounded-full border-4 border-gray-50 object-cover shadow-sm">
                                <button
                                    class="absolute bottom-0 right-0 w-10 h-10 bg-brand-500 hover:bg-brand-600 text-white rounded-full flex items-center justify-center shadow-lg transition-colors border-2 border-white">
                                    <i data-lucide="camera" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <span class="text-xs text-slate-500 font-medium">JPEG or PNG. Max 2MB.</span>
                        </div>

                        <!-- Form Fields Column -->
                        <div class="flex-1 w-full space-y-5">
                            <div class="grid sm:grid-cols-2 gap-5">
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">First Name</label>
                                    <input type="text" class="input-field" value="Alex">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">Last Name</label>
                                    <input type="text" class="input-field" value="Mitchell">
                                </div>
                            </div>

                            <div class="grid sm:grid-cols-2 gap-5">
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                                    <div class="relative">
                                        <input type="email" class="input-field pl-11" value="alex.mitchell@example.com">
                                        <i data-lucide="mail"
                                            class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                                    <div class="relative">
                                        <input type="tel" class="input-field pl-11" value="+1 (555) 000-0000">
                                        <i data-lucide="phone"
                                            class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                    </div>
                                </div>
                            </div>

                            <div class="pt-4 flex justify-end">
                                <button
                                    class="bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 px-8 rounded-xl transition-colors shadow-sm">Save
                                    Changes</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <!-- Password Update -->
                    <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex flex-col h-full">
                        <h3 class="font-bold text-slate-900 text-lg mb-6 tracking-tight">Security</h3>

                        <div class="space-y-4 flex-1">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Current Password</label>
                                <input type="password" class="input-field" placeholder="••••••••">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">New Password</label>
                                <input type="password" class="input-field" placeholder="••••••••">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Confirm New Password</label>
                                <input type="password" class="input-field" placeholder="••••••••">
                            </div>
                        </div>

                        <div class="pt-6">
                            <button
                                class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-6 rounded-xl transition-colors">Update
                                Password</button>
                        </div>
                    </div>

                    <!-- Preferences -->
                    <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex flex-col h-full">
                        <h3 class="font-bold text-slate-900 text-lg mb-6 tracking-tight">Preferences</h3>

                        <div class="space-y-6 flex-1">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">Language</label>
                                <div class="relative">
                                    <select class="input-field appearance-none cursor-pointer">
                                        <option>English (US)</option>
                                        <option>Vietnamese</option>
                                        <option>Spanish</option>
                                    </select>
                                    <i data-lucide="chevron-down"
                                        class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                                </div>
                            </div>

                            <hr class="border-gray-100">

                            <div class="space-y-4">
                                <label class="block text-sm font-bold text-slate-700">Notifications</label>

                                <label class="flex items-center justify-between cursor-pointer group">
                                    <div>
                                        <div
                                            class="text-sm font-bold text-slate-900 group-hover:text-brand-600 transition-colors">
                                            Cashback Updates</div>
                                        <div class="text-xs text-slate-500">Get notified when cashback is tracked or
                                            available.</div>
                                    </div>
                                    <div class="relative">
                                        <input type="checkbox" class="sr-only peer" checked>
                                        <div
                                            class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-500">
                                        </div>
                                    </div>
                                </label>

                                <label class="flex items-center justify-between cursor-pointer group">
                                    <div>
                                        <div
                                            class="text-sm font-bold text-slate-900 group-hover:text-brand-600 transition-colors">
                                            Promotional Emails</div>
                                        <div class="text-xs text-slate-500">Receive special offers and hot deals.</div>
                                    </div>
                                    <div class="relative">
                                        <input type="checkbox" class="sr-only peer">
                                        <div
                                            class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-500">
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <div class="md:hidden fixed bottom-6 left-4 right-4 z-50">
        <div
            class="bg-white/95 backdrop-blur-xl border border-gray-100 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] rounded-3xl p-2 flex justify-between items-center px-4">

            <a href="dashboard-home.html"
                class="flex flex-col items-center justify-center w-14 h-14 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
            </a>

            <a href="dashboard-cashback.html"
                class="flex flex-col items-center justify-center w-14 h-14 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="search" class="w-6 h-6"></i>
            </a>

            <a href="dashboard-withdraw.html"
                class="flex flex-col items-center justify-center w-14 h-14 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="arrow-down-to-line" class="w-6 h-6"></i>
            </a>

            <a href="dashboard-profile.html" class="flex flex-col items-center justify-center w-14 h-14 text-brand-500">
                <div class="relative">
                    <i data-lucide="user" class="w-6 h-6 mb-1"></i>
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-brand-500 rounded-full"></span>
                </div>
            </a>

        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
