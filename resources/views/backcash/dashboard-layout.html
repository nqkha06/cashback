<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-gray-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Backcash</title>

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fff3f0',
                            100: '#ffe4dd',
                            400: '#FF8A65',
                            500: '#FF7043',
                            600: '#f9512d',
                            900: '#752210',
                        },
                        navy: {
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.05)',
                        'card': '0 20px 40px -15px rgba(0,0,0,0.08)',
                        'float': '0 25px 50px -12px rgba(0,0,0,0.15)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-card {
                @apply bg-white/95 backdrop-blur-lg shadow-card border border-white/80;
            }
            .text-gradient {
                @apply text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-orange-500;
            }
            .text-gradient-light {
                @apply text-transparent bg-clip-text bg-gradient-to-r from-white to-brand-100;
            }
            /* Custom active state for sidebar links */
            .sidebar-link-active {
                @apply bg-brand-50 text-brand-600 font-bold;
            }
            .sidebar-link-inactive {
                @apply text-slate-500 hover:bg-gray-50 hover:text-slate-900 font-medium;
            }
        }
        
        /* Hide scrollbar for clean look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>

<body class="text-slate-800 antialiased selection:bg-brand-500 selection:text-white flex h-screen overflow-hidden">

    <!-- Desktop Sidebar (Hidden on mobile) -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-100 h-full flex-shrink-0 relative z-20">
        <!-- Logo Area -->
        <div class="h-20 flex items-center px-6 border-b border-gray-50">
            <a href="dashboard-home.html" class="flex items-center gap-2">
                <div
                    class="w-10 h-10 bg-gradient-to-br from-brand-400 to-orange-500 rounded-xl flex items-center justify-center text-white shadow-sm">
                    <i data-lucide="wallet" class="w-6 h-6"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900">Backcash</span>
            </a>
        </div>

        <!-- Navigation Links -->
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1 no-scrollbar">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-3">Menu</div>

            <a href="dashboard-home.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-active transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span>Dashboard</span>
            </a>

            <a href="dashboard-cashback.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span>Cashback Home</span>
            </a>

            <a href="dashboard-withdraw.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="arrow-down-to-line" class="w-5 h-5"></i>
                <span>Withdraw</span>
            </a>

            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="receipt" class="w-5 h-5"></i>
                <span>Transactions</span>
            </a>

            <a href="dashboard-products.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
                <span>Top Products</span>
            </a>

            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 mt-8 px-3">Community</h3>

            <a href="dashboard-leaderboard.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="trophy" class="w-5 h-5"></i>
                <span>Leaderboard</span>
            </a>

            <a href="dashboard-referral.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span>Refer & Earn</span>
            </a>

            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 mt-8 px-3">Account</div>

            <a href="dashboard-profile.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span>Profile</span>
            </a>

            <a href="dashboard-payment.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="credit-card" class="w-5 h-5"></i>
                <span>Payment Methods</span>
            </a>

            <a href="dashboard-about.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="info" class="w-5 h-5"></i>
                <span>About Platform</span>
            </a>
        </div>

        <!-- Bottom Settings/Help -->
        <div class="p-4 border-t border-gray-50">
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>Settings</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl sidebar-link-inactive transition-colors">
                <i data-lucide="life-buoy" class="w-5 h-5"></i>
                <span>Help Center</span>
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full bg-slate-50 relative overflow-hidden">

        <!-- Top Header (Desktop & Mobile) -->
        <header
            class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-6 z-10 flex-shrink-0">
            <!-- Mobile Logo (Visible only on mobile) -->
            <div class="md:hidden flex items-center gap-2">
                <div
                    class="w-8 h-8 bg-gradient-to-br from-brand-400 to-orange-500 rounded-lg flex items-center justify-center text-white shadow-sm">
                    <i data-lucide="wallet" class="w-4 h-4"></i>
                </div>
            </div>

            <!-- Search Bar (Desktop only) -->
            <div class="hidden md:flex max-w-md w-full relative">
                <i data-lucide="search" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" placeholder="Search stores, products..."
                    class="w-full bg-gray-50 border border-gray-200 text-slate-900 text-sm rounded-full focus:ring-brand-500 focus:border-brand-500 block pl-10 p-2.5 transition-all outline-none pb-2.5 pt-2.5 placeholder-slate-400 hover:bg-white hover:border-gray-300">
            </div>

            <!-- Right Actions -->
            <div class="flex items-center gap-3 md:gap-5 flex-1 justify-end">

                <!-- Mobile Search Icon -->
                <button
                    class="md:hidden w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:bg-gray-100">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </button>

                <!-- Balance Badge (Hidden on very small screens) -->
                <div
                    class="hidden sm:flex items-center gap-2 bg-green-50 px-3 py-1.5 rounded-full border border-green-100">
                    <i data-lucide="coins" class="w-4 h-4 text-green-600"></i>
                    <span class="font-bold text-green-700 text-sm">$340.50</span>
                </div>

                <!-- Notifications -->
                <button
                    class="relative w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:bg-gray-100 focus:outline-none transition-colors">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span
                        class="absolute top-2 right-2.5 w-2 h-2 bg-brand-500 rounded-full border-2 border-white"></span>
                </button>

                <!-- Avatar Dropdown -->
                <button class="flex items-center gap-2 focus:outline-none pl-2 border-l border-gray-200">
                    <img src="https://i.pravatar.cc/150?img=11" alt="User Avatar"
                        class="w-9 h-9 rounded-full border-2 border-white shadow-sm box-content">
                    <div class="hidden md:block text-left">
                        <div class="text-sm font-bold text-slate-900 leading-tight">Alex Mitchell</div>
                        <div class="text-[11px] text-slate-500 font-medium">Free Member</div>
                    </div>
                    <i data-lucide="chevron-down" class="hidden md:block w-4 h-4 text-slate-400"></i>
                </button>
            </div>
        </header>

        <!-- Page Content Scrollable Area -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 no-scrollbar">
            <div class="max-w-6xl mx-auto space-y-6">
                <!-- PAGE CONTENT GOES HERE -->
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Navigation (Visible only on mobile) -->
    <div class="md:hidden fixed bottom-6 left-4 right-4 z-50">
        <div
            class="bg-white/95 backdrop-blur-xl border border-gray-100 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] rounded-3xl p-2 flex justify-between items-center px-4">

            <a href="dashboard-home.html" class="flex flex-col items-center justify-center w-14 h-14 text-brand-500">
                <div class="relative">
                    <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
                    <!-- Active Dot Indicator -->
                    <span
                        class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-brand-500 rounded-full"></span>
                </div>
            </a>

            <a href="dashboard-cashback.html"
                class="flex flex-col items-center justify-center w-14 h-14 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="search" class="w-6 h-6"></i>
            </a>

            <a href="dashboard-leaderboard.html"
                class="flex flex-col items-center justify-center w-12 h-12 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="trophy" class="w-6 h-6"></i>
            </a>

            <a href="dashboard-referral.html"
                class="flex flex-col items-center justify-center w-12 h-12 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="users" class="w-6 h-6"></i>
            </a>

            <a href="dashboard-profile.html"
                class="flex flex-col items-center justify-center w-14 h-14 text-slate-400 hover:text-slate-900 transition-colors">
                <i data-lucide="user" class="w-6 h-6"></i>
            </a>

        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
